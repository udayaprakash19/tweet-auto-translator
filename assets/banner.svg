<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="120" fill="url(#glow)" opacity="0.4"/>
  <circle cx="1100" cy="320" r="150" fill="url(#glow)" opacity="0.3"/>
  <circle cx="900" cy="60" r="80" fill="url(#glow)" opacity="0.2"/>

  <!-- Globe icon -->
  <g transform="translate(200, 200)" opacity="0.9">
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="30" ry="60" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="url(#accent)" stroke-width="1.5"/>
    <path d="M-55,-25 Q0,-30 55,-25" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <path d="M-55,25 Q0,30 55,25" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(310, 185)">
    <line x1="0" y1="15" x2="60" y2="15" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <polyline points="48,5 62,15 48,25" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Translate icon (document with A) -->
  <g transform="translate(420, 160)" opacity="0.9">
    <rect x="0" y="0" width="70" height="80" rx="8" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <text x="35" y="55" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#accent)" text-anchor="middle">A</text>
    <text x="35" y="28" font-family="Arial, sans-serif" font-size="14" fill="url(#accent)" text-anchor="middle" opacity="0.7">abc</text>
  </g>

  <!-- Title -->
  <text x="600" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    AutoPostTranslate
  </text>

  <!-- Subtitle -->
  <text x="600" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#a0a0c0" text-anchor="middle">
    Automatically translate any post on the web into your preferred language
  </text>

  <!-- Accent line -->
  <rect x="400" y="240" width="400" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Tags -->
  <g transform="translate(600, 280)" text-anchor="middle">
    <rect x="-240" y="-15" width="140" height="30" rx="15" fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-width="1"/>
    <text x="-170" y="5" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#00d2ff">Chrome Extension</text>

    <rect x="-70" y="-15" width="140" height="30" rx="15" fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-width="1"/>
    <text x="0" y="5" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#00d2ff">GROQ AI Powered</text>

    <rect x="100" y="-15" width="140" height="30" rx="15" fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-width="1"/>
    <text x="170" y="5" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#00d2ff">Auto Translate</text>
  </g>

  <!-- Bottom dots decoration -->
  <circle cx="560" cy="340" r="3" fill="#00d2ff" opacity="0.5"/>
  <circle cx="580" cy="340" r="3" fill="#7b2ff7" opacity="0.5"/>
  <circle cx="600" cy="340" r="3" fill="#00d2ff" opacity="0.5"/>
  <circle cx="620" cy="340" r="3" fill="#7b2ff7" opacity="0.5"/>
  <circle cx="640" cy="340" r="3" fill="#00d2ff" opacity="0.5"/>
</svg>
